<!Doctype html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <title>Story Maker</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <h1>Story Maker</h1>

    <button id="btn-who" onclick="cycleWho()">Who?</button>

    <button id="btn-what" onclick="cycleWhat()">What?</button>

    <button id="btn-where" onclick="cycleWhere()">Where?</button>

    <button id="btn-when" onclick="cycleWhen()">When?</button>

    <button id="btn-how" onclick="cycleHow()">How?</button>

    <p id="story-output"></p>
    <button id="btn-story" onclick="tellStory()">🚀 Tell My Story</button>
    
    <button id="btn-random" onclick="randomStory()">🎲 Random Story</button>
<button id="btn-reset"  onclick="resetStory()">🔄 Reset</button>

<script src="script.js"></script>
</body>
</html>
